appId: dev.oh-my-huggingface.desktop
productName: Oh My HuggingFace
copyright: Copyright © 2026 Oh My HuggingFace contributors

directories:
  buildResources: build
  output: release

files:
  - out/**

asarUnpack:
  - '**/*.node'

npmRebuild: true
electronVersion: 43.1.0

# Strip extended attributes (com.apple.provenance, iCloud fileprovider tags)
# before signing; codesign hard-fails on them ("detritus not allowed").
afterPack: ./scripts/mac-strip-xattrs.cjs

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    # zip is required for Squirrel.Mac: without it electron-builder emits no
    # latest-mac.yml and electron-updater cannot stage macOS auto-updates.
    - zip
  # Ad-hoc signature for local builds. Release CI overrides this with the
  # self-signed OhMyHF-Release certificate (build:mac:release) so Squirrel.Mac
  # can validate auto-updates; still not notarized — see docs/signing.md.
  identity: '-'
  # Fail the build instead of silently shipping an unsigned (broken-seal) app
  # when the release identity cannot be found, e.g. a missing CI secret.
  # Ad-hoc ('-') always resolves, so local builds are unaffected.
  forceCodeSigning: true
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # productName has spaces ("Oh My HuggingFace"); electron-builder's default
  # artifactName preserves them in the built file, but the safe name it
  # computes for latest-mac.yml's differential-update reference replaces every
  # space with a hyphen. --publish never (used by CI's build job) never
  # renames the real file to match, so the two silently diverge and preflight
  # fails with "references missing artifact". Space-free artifactName here
  # makes the built file and the safe name identical, everywhere, always.
  artifactName: 'Oh-My-HuggingFace-${version}-${arch}.${ext}'

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  # See the mac.artifactName comment above — same fix, same reason.
  artifactName: 'Oh-My-HuggingFace-Setup-${version}.${ext}'

linux:
  target:
    - AppImage
    - deb
  category: Development
  synopsis: Unofficial desktop client for the Hugging Face Hub
  maintainer: Oh My HuggingFace contributors
  executableName: oh-my-huggingface
  desktop:
    entry:
      StartupWMClass: oh-my-huggingface

# .deb already gets a fully sanitized name from dpkg tooling; only AppImage
# needs the same space-free artifactName fix as mac/nsis above (scoped here,
# not under linux:, so it doesn't touch the .deb naming convention).
appImage:
  artifactName: 'Oh-My-HuggingFace-${version}.${ext}'

# Must match the repository the release CI runs in: GITHUB_TOKEN can only publish
# there, and electron-updater reads this same config to find update artifacts.
publish:
  provider: github
  owner: oh-my-hf
  repo: ohmyhf
