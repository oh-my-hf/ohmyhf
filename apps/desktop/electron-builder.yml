appId: dev.oh-my-huggingface.desktop
productName: Oh My HuggingFace
copyright: Copyright © 2026 Oh My HuggingFace contributors

directories:
  buildResources: build
  output: release

files:
  - out/**

asarUnpack:
  - '**/*.node'

npmRebuild: true
electronVersion: 43.1.0

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    # zip is required for Squirrel.Mac: without it electron-builder emits no
    # latest-mac.yml and electron-updater cannot stage macOS auto-updates.
    - zip
  # Unsigned for now — see docs/signing.md for the notarization follow-up.
  identity: null

win:
  target:
    - nsis

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
    - deb
  category: Development
  synopsis: Unofficial desktop client for the Hugging Face Hub
  maintainer: Oh My HuggingFace contributors
  executableName: oh-my-huggingface
  desktop:
    entry:
      StartupWMClass: oh-my-huggingface

# Must match the repository the release CI runs in: GITHUB_TOKEN can only publish
# there, and electron-updater reads this same config to find update artifacts.
publish:
  provider: github
  owner: oh-my-hf
  repo: ohmyhf
