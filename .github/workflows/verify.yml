name: Verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: Format, lint, typecheck, coverage, build, Ubuntu E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies (high and critical)
        run: |
          set -o pipefail
          mkdir -p .ci-logs
          pnpm audit --prod --audit-level high 2>&1 | tee .ci-logs/audit.log

      - name: Check formatting
        run: |
          set -o pipefail
          pnpm format:check 2>&1 | tee .ci-logs/format.log

      - name: Lint (zero warnings)
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee .ci-logs/lint.log

      - name: Typecheck
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee .ci-logs/typecheck.log

      - name: Test release safety tooling
        run: pnpm test:release-tools

      - name: Unit tests with coverage
        run: |
          set -o pipefail
          pnpm test:coverage 2>&1 | tee .ci-logs/coverage.log

      - name: Build
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee .ci-logs/build.log

      - name: Verify strict-CSP syntax highlighting bundle
        run: pnpm verify:syntax-build

      - name: Ubuntu E2E
        run: |
          set -o pipefail
          xvfb-run --auto-servernum pnpm --filter oh-my-huggingface-desktop test:e2e \
            2>&1 | tee .ci-logs/e2e.log

      - name: Upload verification diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verify-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          retention-days: 14
          include-hidden-files: true
          path: |
            .ci-logs/
            coverage/
            apps/desktop/coverage/
            apps/desktop/playwright-report/
            apps/desktop/test-results/
