name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: build:linux
          - os: macos-latest
            target: build:mac
          - os: windows-latest
            target: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build and publish
        run: pnpm --filter oh-my-huggingface-desktop ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS builds are currently unsigned; see docs/signing.md.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
