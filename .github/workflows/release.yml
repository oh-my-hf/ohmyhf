name: Release

# A release is cut by landing a commit on main whose subject is:
#   [RELEASE] Vx.y.z
# The version must already match apps/desktop/package.json. This job then tags
# vx.y.z, drafts a GitHub Release whose notes are the commits since the previous
# tag, builds all three platforms, uploads their artifacts, and publishes.
on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.check.outputs.release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the changelog range and previous-tag lookup work.
          fetch-depth: 0

      - id: check
        name: Detect [RELEASE] commit and validate the version
        run: |
          set -euo pipefail
          msg="$(git log -1 --pretty=%s)"
          echo "Head commit subject: $msg"
          if [[ ! "$msg" =~ ^\[RELEASE\] ]]; then
            echo "Not a [RELEASE] commit; nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # It IS a release commit: the version must be a plain semver x.y.z.
          # Fail loudly on a malformed version rather than silently doing nothing.
          if [[ "$msg" =~ ^\[RELEASE\][[:space:]]+[vV]?([0-9]+\.[0-9]+\.[0-9]+)([[:space:]].*)?$ ]]; then
            version="${BASH_REMATCH[1]}"
          else
            echo "::error::[RELEASE] subject must be '[RELEASE] Vx.y.z' with a plain semver version (no pre-release or build suffix). Got: $msg"
            exit 1
          fi
          pkg="$(jq -r .version apps/desktop/package.json)"
          if [[ "$version" != "$pkg" ]]; then
            echo "::error::[RELEASE] version v$version does not match apps/desktop/package.json ($pkg). Bump the package version first."
            exit 1
          fi
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "::error::Tag v$version already exists; use a new version."
            exit 1
          fi
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Releasing v$version"

      - name: Generate changelog, tag, and draft the release
        if: steps.check.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.check.outputs.version }}
        run: |
          set -euo pipefail
          tag="v$VERSION"
          prev="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
          if [[ -n "$prev" ]]; then
            range="$prev..HEAD"
          else
            range="HEAD"
          fi
          {
            echo "## What's changed"
            echo
            # One bullet per non-merge commit since the previous release; drop the
            # [RELEASE] commit itself. Fall back to a placeholder if the range is empty.
            body="$(git log --no-merges --pretty='- %s (%h)' "$range" | grep -v '^- \[RELEASE\]' || true)"
            if [[ -n "$body" ]]; then
              echo "$body"
            else
              echo "- Maintenance release."
            fi
            echo
            if [[ -n "$prev" ]]; then
              echo "**Full changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${prev}...${tag}"
            fi
          } > CHANGELOG_RELEASE.md
          echo "----- release notes -----"
          cat CHANGELOG_RELEASE.md
          echo "-------------------------"
          # Create the tag and a DRAFT release; the matrix build uploads assets to it.
          git tag "$tag"
          git push origin "$tag"
          gh release create "$tag" --draft --title "$tag" --notes-file CHANGELOG_RELEASE.md

  build:
    needs: prepare
    if: needs.prepare.outputs.release == 'true'
    strategy:
      # Don't cancel the other platforms if one fails; the draft stays for inspection.
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: build:linux
          - os: macos-latest
            target: build:mac:release
          - os: windows-latest
            target: build:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.prepare.outputs.version }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable corepack (pnpm)
        run: corepack enable
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Self-signed release certificate (CN OhMyHF-Release): electron-builder only
      # accepts identities that `security find-identity -v -p codesigning` lists as
      # valid, and that requires the certificate to be TRUSTED, not just imported.
      # macOS runners have passwordless sudo, so trust it in the admin domain.
      # See docs/signing.md for why this certificate exists (Squirrel.Mac updates).
      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [[ -z "$MAC_CSC_LINK" || -z "$MAC_CSC_KEY_PASSWORD" ]]; then
            echo "::error::MAC_CSC_LINK / MAC_CSC_KEY_PASSWORD secrets are missing; macOS builds must be signed (docs/signing.md)."
            exit 1
          fi
          KEYCHAIN="$RUNNER_TEMP/ohmyhf-sign.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          printf '%s' "$MAC_CSC_LINK" | base64 -d > "$RUNNER_TEMP/sign.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/sign.p12" -k "$KEYCHAIN" -P "$MAC_CSC_KEY_PASSWORD" -T /usr/bin/codesign
          # Allow codesign to use the key without a UI prompt (headless runner).
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" > /dev/null
          security find-certificate -c OhMyHF-Release -p "$KEYCHAIN" > "$RUNNER_TEMP/sign.pem"
          sudo security add-trusted-cert -d -r trustRoot -k /Library/Keychains/System.keychain "$RUNNER_TEMP/sign.pem"
          rm "$RUNNER_TEMP/sign.p12"
          # codesign resolves identities by NAME through the keychain SEARCH LIST,
          # not the --keychain hint, so the throwaway keychain must be on it.
          existing=$(security list-keychains -d user | tr -d '" ')
          security list-keychains -d user -s "$KEYCHAIN" $existing
          # electron-builder reads CSC_KEYCHAIN when no CSC_LINK is set.
          echo "CSC_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "--- identities now valid for codesigning:"
          security find-identity -v -p codesigning "$KEYCHAIN"
      - name: Build and upload to the draft release
        run: pnpm --filter oh-my-huggingface-desktop ${{ matrix.target }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Never pick up a stray local identity; macOS uses the explicit
          # OhMyHF-Release identity from build:mac:release. See docs/signing.md.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

  publish:
    needs: [prepare, build]
    # Only when every platform built; a partial matrix leaves the release drafted.
    if: needs.prepare.outputs.release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "v${{ needs.prepare.outputs.version }}" --draft=false --latest
